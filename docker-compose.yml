services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: gerencai
      POSTGRES_USER: gerencai_user
      POSTGRES_PASSWORD: gerencai_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U gerencai_user -d gerencai" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    environment:
      DJANGO_SECRET_KEY: "change-me-in-production"
      DJANGO_DEBUG: "True"
      DATABASE_URL: "postgres://gerencai_user:gerencai_password@db:5432/gerencai"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,backend,frontend"
      CORS_ORIGINS: "http://localhost:8888,http://127.0.0.1:8888"
      REDIS_URL: "redis://redis:6379/0"
      ENCRYPTION_KEY: "lgpd-MUDE-ESTA-CHAVE-EM-PRODUCAO-gere-uma-nova-32chars"
    volumes:
      - ./backend:/app
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "9999:9999"

  frontend:
    build:
      context: .
    ports:
      - "8888:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
